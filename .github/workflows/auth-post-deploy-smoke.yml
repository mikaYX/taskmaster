name: Auth Post-Deploy Smoke Canary

on:
    # Peut être déclenché automatiquement après un "vrai" déploiement (Si vous utilisez les environnements GitHub)
    # deployment_status:
    #
    # Ou manuellement post-deploy:
    workflow_dispatch:
        inputs:
            target_env:
                description: "Lien API cible"
                required: true
                default: "https://staging.taskmaster.com/api"

jobs:
    smoke-test-canary:
        name: Canary Auth Check
        runs-on: ubuntu-latest

        # Restreindre le job à un environnement contenant les secrets dédiés au Smoke Test
        environment: staging

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"

            - name: Run Smoke Test Script
              env:
                  API_URL: ${{ github.event.inputs.target_env || 'http://localhost:3000/api' }}
                  SMOKE_USERNAME: ${{ secrets.SMOKE_TEST_USERNAME }}
                  SMOKE_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
              run: |
                  # Utilisation de npx tsx ou ts-node pour lancer le script sans étape de build front/back lourde.
                  # Le script utilise native fetch (Node 18+)
                  npx ts-node scripts/smoke-test-auth.ts

            - name: Rollback / Alert en cas d'échec
              if: failure()
              run: |
                  echo "::error title=Auth Degradation Detected::Le script canary a échoué. Réfère-toi IMMÉDIATEMENT au document 'docs/RUNBOOK_AUTH_DEGRADATION.md'"
                  # Optionnel: Notifier l'équipe via webhook (e.g. Slack/Teams)
                  # curl -X POST -H 'Content-type: application/json' --data '{"text":"🚨 ALERTE CRITIQUE: Le Smoke Test Auth a échoué sur '${{ github.event.inputs.target_env }}'."}' ${{ secrets.SLACK_WEBHOOK_URL }}
