name: Docker Build & Push

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  docker:
    name: Build & push to Docker Hub
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Docker Hub configuration
        shell: bash
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          missing=()

          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            missing+=("DOCKERHUB_USERNAME (repository variable or legacy secret)")
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            missing+=("DOCKERHUB_TOKEN (repository secret)")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error title=Docker Hub configuration missing::Configure %s before publishing a release image.\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/taskmaster
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
